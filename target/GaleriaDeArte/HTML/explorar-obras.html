<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Explorar Obras</title>
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body>
    <!-- El navbar y el menú los inyecta componentes.js automáticamente -->
    <div id="navbar-placeholder"></div>
    <main class="main-section">
      <section class="main-header">
        <h1>Explora nuestras piezas artísticas</h1>
        <p>Encuentra piezas de diversos artistas.</p>
      </section>
      <section class="tabs-section">
        <div class="tabs">
          <button class="tab active" data-tab="individuales">
            Obras Individuales
            <span class="badge" id="badge-individuales"> ... </span>
          </button>
        </div>
      </section>
      <div class="filtro-container">
        <button class="btn-filtro" id="abrirFiltro">
          <i class="fa-solid fa-filter"> </i>
          Filtrar
        </button>
      </div>
      <section class="container">
        <!-- Las tarjetas las genera galeria.js, no están escritas aquí -->
        <div
          class="galeria tab-content active"
          id="contenido-individuales"
        ></div>
      </section>
      <!-- Panel de filtros (ahora con IDs para que galeria.js los lea) -->
      <aside class="panel-filtros" id="panelFiltros">
        <div class="panel-header">
          <h3>Filtrar</h3>
          <button class="close-btn" id="cerrarFiltro">
            <i class="fa-solid fa-xmark"> </i>
          </button>
        </div>
        <div class="panel-content">
          <h4>Palabras Clave</h4>
          <input
            id="filtro-q"
            placeholder="Ej: óleo, abstracto..."
            type="text"
          />
          <h4>Rango de Precios</h4>
          <input
            id="filtro-precio"
            max="5000000"
            min="0"
            step="50000"
            type="range"
            value="5000000"
          />
          <p id="filtro-precio-label">Hasta $5.000.000</p>
          <h4>Categoría</h4>
          <select id="filtro-categoria">
            <option value="">Todas</option>
            <option value="Pintura">Pintura</option>
            <option value="Escultura">Escultura</option>
            <option value="Fotografía">Fotografía</option>
            <option value="Técnica Mixta">Técnica Mixta</option>
          </select>
          <button
            class="btn-filtro"
            id="btn-aplicar-filtro"
            style="margin-top: 1rem"
          >
            Aplicar filtro
          </button>
        </div>
      </aside>
    </main>
    <!-- El footer lo inyecta componentes.js automáticamente -->
    <div id="footer-placeholder"></div>
    <!-- ORDEN IMPORTANTE: componentes primero, luego los demás -->
    <script src="../JS/componentes.js"></script>
    <script src="../JS/filtros.js"></script>
    <script src="../JS/galeria.js"></script>
  </body>
</html>
