<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Datos de Envío</title>
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body data-proteger="true">
    <div id="navbar-placeholder"></div>
    <main class="checkout-main">
      <!-- Indicador de pasos -->
      <div class="checkout-steps">
        <div class="step active">
          <span class="step-num"> 1 </span>
          <span class="step-label"> Envío </span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num"> 2 </span>
          <span class="step-label"> Pago </span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num"> 3 </span>
          <span class="step-label"> Confirmación </span>
        </div>
      </div>
      <section class="checkout-card">
        <h2>Datos de Envío</h2>
        <form action="checkout-pago.html" id="form-envio" method="get">
          <div class="form-group">
            <label> Nombre completo </label>
            <input
              name="nombre"
              placeholder="Ej: Juan Pérez"
              required=""
              type="text"
            />
          </div>
          <div class="form-group">
            <label> Dirección </label>
            <input
              name="direccion"
              placeholder="Calle 10 # 20-30"
              required=""
              type="text"
            />
          </div>
          <div class="form-group">
            <label> Ciudad </label>
            <input name="ciudad" placeholder="Bogotá" required="" type="text" />
          </div>
          <div class="form-group">
            <label> Teléfono </label>
            <input
              name="telefono"
              placeholder="+57 300 000 0000"
              required=""
              type="tel"
            />
          </div>
          <div class="form-group">
            <label> Tipo de envío </label>
            <select name="envio" required="">
              <option value="15000">Estándar — $15.000 COP (3-5 días)</option>
              <option value="30000">Express — $30.000 COP (1-2 días)</option>
            </select>
          </div>
          <div class="checkout-actions">
            <a class="btn-secundario" href="carrito.html">
              ← Volver al carrito
            </a>
            <button class="btn-publicar" type="submit">
              Continuar al pago →
            </button>
          </div>
        </form>
      </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
  </body>
</html>
