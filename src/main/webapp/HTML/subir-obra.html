<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Subir Obras</title>
    <!-- Iconos -->
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <!-- Estilos -->
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body data-proteger="true">
    <div id="navbar-placeholder"></div>
    <!-- ======== NAVBAR ======== -->
    <!-- MENÚ DESPLEGABLE -->
    <!-- SECCIÓN DE PUBLICAR OBRA -->
    <section class="publicar-section" data-rol="artista">
      <div class="publicar-container">
        <h1>Publicar Obra</h1>
        <form
          action="../api/obra/subir"
          enctype="multipart/form-data"
          method="post"
        >
          <div class="form-group">
            <label> Título de la obra </label>
            <input placeholder="Ej: Amanecer en la ciudad" type="text" />
          </div>
          <div class="form-group">
            <label> Descripción </label>
            <textarea placeholder="Describe tu obra..."></textarea>
          </div>
          <div class="form-group">
            <label> Precio (COP) </label>
            <input placeholder="Ej: 250000" type="number" />
          </div>
          <div class="form-group">
            <label> Subir imagen </label>
            <input accept="image/*" type="file" />
          </div>
          <button class="btn-publicar" type="submit">Publicar Obra</button>
        </form>
      </div>
    </section>
    <!-- FOOTER -->
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
  </body>
</html>
