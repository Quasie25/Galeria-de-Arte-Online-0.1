<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Panel de Moderación</title>
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body data-proteger="true">
    <div id="navbar-placeholder"></div>
    <!-- NAVBAR -->
    <!-- MENÚ DESPLEGABLE -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>
          <i class="fa-solid fa-shield-halved"> </i>
          Panel de Moderación
        </h1>
        <p>
          Revisa las obras enviadas por los artistas y decide si cumplen con las
          normas de la galería.
        </p>
      </div>
      <!-- Tabs de estado -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-estado="pendiente">
          <i class="fa-solid fa-clock"> </i>
          Pendientes
        </button>
        <button class="admin-tab" data-estado="aprobada">
          <i class="fa-solid fa-check-circle"> </i>
          Aprobadas
        </button>
        <button class="admin-tab" data-estado="rechazada">
          <i class="fa-solid fa-ban"> </i>
          Rechazadas
        </button>
      </div>
      <!-- Grid de obras -->
      <div class="galeria admin-grid" id="obras-grid">
        <p class="cargando">Cargando obras...</p>
      </div>
    </main>
    <!-- FOOTER -->
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
    <script src="../JS/admin-panel.js"></script>
  </body>
</html>
