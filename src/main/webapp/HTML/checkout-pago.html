<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Arte - Método de Pago</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../CSS/main.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="login.html" class="nav-logo">Galería de Arte</a>
        <i class="fa-solid fa-bars menu-icon"></i>
      </div>
    </nav>

    <div class="menu-dropdown">
      <a href="login.html">Inicio</a>
      <a href="perfil.html">Perfil</a>
      <div class="submenu">
        <a href="explorar-obras.html" class="submenu-btn">Explorar Obras ▾</a>
        <div class="submenu-content">
          <a href="explorar-obras.html">Todas las Obras</a>
          <a href="explorar-obras.html">Obras Nuevas</a>
          <a href="explorar-obras.html">Más Vendidas</a>
        </div>
      </div>
      <a href="sobre-nosotros.html">Sobre Nosotros</a>
      <a href="ayuda.html">Ayuda</a>
    </div>

    <main class="checkout-main">
      <!-- Indicador de pasos -->
      <div class="checkout-steps">
        <div class="step done">
          <span class="step-num"><i class="fa-solid fa-check"></i></span>
          <span class="step-label">Envío</span>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
          <span class="step-num">2</span>
          <span class="step-label">Pago</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num">3</span>
          <span class="step-label">Confirmación</span>
        </div>
      </div>

      <section class="checkout-card">
        <h2>Método de Pago</h2>
        <form id="form-pago" action="checkout-confirmacion.html" method="get">
          <div class="form-group">
            <label>Método</label>
            <select
              id="metodo-pago"
              name="metodo"
              required
              onchange="mostrarFormPago(this.value)"
            >
              <option value="">Selecciona...</option>
              <option value="tarjeta">Tarjeta de crédito / débito</option>
              <option value="pse">PSE (transferencia bancaria)</option>
              <option value="nequi">Nequi</option>
            </select>
          </div>

          <!-- Tarjeta -->
          <div id="pago-tarjeta" class="pago-bloque" style="display: none">
            <div class="form-group">
              <label>Número de tarjeta</label>
              <input
                type="text"
                name="tarjeta_num"
                placeholder="0000 0000 0000 0000"
                maxlength="19"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Vencimiento</label>
                <input
                  type="text"
                  name="tarjeta_exp"
                  placeholder="MM/AA"
                  maxlength="5"
                />
              </div>
              <div class="form-group">
                <label>CVV</label>
                <input
                  type="text"
                  name="tarjeta_cvv"
                  placeholder="123"
                  maxlength="4"
                />
              </div>
            </div>
            <div class="form-group">
              <label>Nombre en la tarjeta</label>
              <input
                type="text"
                name="tarjeta_nombre"
                placeholder="Nombre del titular"
              />
            </div>
          </div>

          <!-- PSE -->
          <div id="pago-pse" class="pago-bloque" style="display: none">
            <div class="form-group">
              <label>Banco</label>
              <select name="pse_banco">
                <option value="">Selecciona tu banco</option>
                <option>Bancolombia</option>
                <option>Banco de Bogotá</option>
                <option>Davivienda</option>
                <option>BBVA</option>
                <option>Banco de Occidente</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tipo de cuenta</label>
              <select name="pse_tipo">
                <option value="ahorros">Ahorros</option>
                <option value="corriente">Corriente</option>
              </select>
            </div>
          </div>

          <!-- Nequi -->
          <div id="pago-nequi" class="pago-bloque" style="display: none">
            <div class="form-group">
              <label>Número de celular Nequi</label>
              <input
                type="tel"
                name="nequi_cel"
                placeholder="300 000 0000"
                maxlength="12"
              />
            </div>
          </div>

          <div class="checkout-actions">
            <a href="checkout-envio.html" class="btn-secundario">← Volver</a>
            <button type="submit" class="btn-publicar">
              Confirmar pedido →
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="../JS/menu.js"></script>
    <script>
      function mostrarFormPago(metodo) {
        ['tarjeta', 'pse', 'nequi'].forEach(function (m) {
          document.getElementById('pago-' + m).style.display =
            m === metodo ? 'block' : 'none';
        });
      }
    </script>
  </body>
</html>
