<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Método de Pago</title>
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body data-proteger="true">
    <div id="navbar-placeholder"></div>
    <main class="checkout-main">
      <!-- Indicador de pasos -->
      <div class="checkout-steps">
        <div class="step done">
          <span class="step-num">
            <i class="fa-solid fa-check"> </i>
          </span>
          <span class="step-label"> Envío </span>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
          <span class="step-num"> 2 </span>
          <span class="step-label"> Pago </span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num"> 3 </span>
          <span class="step-label"> Confirmación </span>
        </div>
      </div>
      <section class="checkout-card">
        <h2>Método de Pago</h2>
        <form action="checkout-confirmacion.html" id="form-pago" method="get">
          <div class="form-group">
            <label> Método </label>
            <select
              id="metodo-pago"
              name="metodo"
              onchange="mostrarFormPago(this.value)"
              required=""
            >
              <option value="">Selecciona...</option>
              <option value="tarjeta">Tarjeta de crédito / débito</option>
              <option value="pse">PSE (transferencia bancaria)</option>
              <option value="nequi">Nequi</option>
            </select>
          </div>
          <!-- Tarjeta -->
          <div class="pago-bloque" id="pago-tarjeta" style="display: none">
            <div class="form-group">
              <label> Número de tarjeta </label>
              <input
                maxlength="19"
                name="tarjeta_num"
                placeholder="0000 0000 0000 0000"
                type="text"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label> Vencimiento </label>
                <input
                  maxlength="5"
                  name="tarjeta_exp"
                  placeholder="MM/AA"
                  type="text"
                />
              </div>
              <div class="form-group">
                <label> CVV </label>
                <input
                  maxlength="4"
                  name="tarjeta_cvv"
                  placeholder="123"
                  type="text"
                />
              </div>
            </div>
            <div class="form-group">
              <label> Nombre en la tarjeta </label>
              <input
                name="tarjeta_nombre"
                placeholder="Nombre del titular"
                type="text"
              />
            </div>
          </div>
          <!-- PSE -->
          <div class="pago-bloque" id="pago-pse" style="display: none">
            <div class="form-group">
              <label> Banco </label>
              <select name="pse_banco">
                <option value="">Selecciona tu banco</option>
                <option>Bancolombia</option>
                <option>Banco de Bogotá</option>
                <option>Davivienda</option>
                <option>BBVA</option>
                <option>Banco de Occidente</option>
              </select>
            </div>
            <div class="form-group">
              <label> Tipo de cuenta </label>
              <select name="pse_tipo">
                <option value="ahorros">Ahorros</option>
                <option value="corriente">Corriente</option>
              </select>
            </div>
          </div>
          <!-- Nequi -->
          <div class="pago-bloque" id="pago-nequi" style="display: none">
            <div class="form-group">
              <label> Número de celular Nequi </label>
              <input
                maxlength="12"
                name="nequi_cel"
                placeholder="300 000 0000"
                type="tel"
              />
            </div>
          </div>
          <div class="checkout-actions">
            <a class="btn-secundario" href="checkout-envio.html"> ← Volver </a>
            <button class="btn-publicar" type="submit">
              Confirmar pedido →
            </button>
          </div>
        </form>
      </section>
    </main>
    <script>
      function mostrarFormPago(metodo) {
        ['tarjeta', 'pse', 'nequi'].forEach(function (m) {
          document.getElementById('pago-' + m).style.display =
            m === metodo ? 'block' : 'none';
        });
      }
    </script>
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
  </body>
</html>
