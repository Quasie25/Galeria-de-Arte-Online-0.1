<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Registro</title>
    <!-- Iconos -->
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <!-- Estilos -->
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body class="registro-page">
    <div id="navbar-placeholder"></div>
    <!-- NAVBAR -->
    <!-- MENÚ DESPLEGABLE -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- CONTENIDO PRINCIPAL -->
    <div class="container">
      <!-- Carrusel -->
      <div class="carousel">
        <div class="slides fade">
          <img alt="Arte 1" src="../Imagenes/arte1.jpeg" />
        </div>
        <div class="slides fade">
          <img alt="Arte 2" src="../Imagenes/arte2.jpeg" />
        </div>
        <div class="slides fade">
          <img alt="Arte 3" src="../Imagenes/arte3.jpeg" />
        </div>
      </div>
      <!-- Formulario de Registro -->
      <section class="register-section">
        <div class="register-container">
          <h1>Crea tu cuenta</h1>
          <form>
            <div class="input-group">
              <i class="fas fa-user"> </i>
              <input placeholder="Nombre completo" required="" type="text" />
            </div>
            <div class="input-group">
              <i class="fas fa-envelope"> </i>
              <input
                placeholder="Correo electrónico"
                required=""
                type="email"
              />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"> </i>
              <input placeholder="Contraseña" required="" type="password" />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"> </i>
              <input
                placeholder="Confirmar contraseña"
                required=""
                type="password"
              />
            </div>
            <button class="btn-login-main" type="submit">Registrarse</button>
            <p class="register-note">
              ¿Ya tienes una cuenta?
              <a href="login.html"> Inicia sesión aquí </a>
            </p>
          </form>
        </div>
      </section>
    </div>
    <!-- FOOTER -->
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
    <script src="../JS/carousel.js"></script>
  </body>
</html>
