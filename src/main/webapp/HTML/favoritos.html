<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Favoritos</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body data-proteger="true">
    <div id="navbar-placeholder"></div>
    <main class="main-section">
      <section class="main-header">
        <h1>Tus obras favoritas</h1>

      </section>
      <section class="container">
        <div class="estado-vacio" id="favoritos-invitado" style="display: none">
          <p>
            Debes
            <a href="login.html"> iniciar sesión </a>

          </p>
        </div>
        <div class="estado-vacio" id="favoritos-vacio" style="display: none">
          <p>
            Todavía no has guardado ninguna obra.
            <a href="explorar-obras.html"> Explorar obras </a>
          </p>
        </div>
        <div class="galeria" id="lista-favoritos"></div>
      </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
    <script src="../JS/favoritos.js"></script>
