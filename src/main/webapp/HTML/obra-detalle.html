<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Arte - Detalle de Obra</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../CSS/main.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div id="navbar-placeholder"></div>

    <main class="obra-detalle-main">
      <!-- Imagen y datos básicos -->
      <section class="obra-detalle-hero">
        <div class="obra-imagen-container">
          <img
            id="obra-imagen"
            src="../Imagenes/arte1.jpeg"
            alt="Imagen de la obra"
          />
        </div>

        <div class="obra-info">
          <h1 id="obra-titulo">Cargando...</h1>
          <p class="obra-artista">
            <i class="fa-solid fa-user"></i> <span id="obra-artista"></span>
          </p>
          <p class="obra-descripcion" id="obra-descripcion"></p>
          <p class="obra-precio" id="obra-precio"></p>

          <!-- Acciones para COMPRADOR / INVITADO -->
          <div class="obra-acciones" data-rol="comprador invitado">
            <button class="btn-publicar" id="btn-agregar-carrito">
              <i class="fa-solid fa-cart-plus"></i> Agregar al carrito
            </button>
            <button class="btn-favorito" id="btn-favorito">
              <i class="fa-solid fa-heart"></i> Guardar en favoritos
            </button>
          </div>

          <!-- Acciones para ARTISTA (solo ve su propia obra) -->
          <div
            class="obra-acciones-artista"
            data-rol="artista"
            style="display: none"
          >
            <a id="btn-editar" href="#" class="btn-publicar">
              <i class="fa-solid fa-pen-to-square"></i> Editar obra
            </a>
            <button class="btn-favorito btn-eliminar-obra" id="btn-eliminar">
              <i class="fa-solid fa-trash"></i> Eliminar obra
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->

    <div id="footer-placeholder"></div>

    <script src="../JS/componentes.js"></script>
    <script src="../JS/menu.js"></script>
    <script src="../JS/session-ui.js"></script>
    <script src="../JS/obra-detalle.js"></script>
  </body>
</html>
