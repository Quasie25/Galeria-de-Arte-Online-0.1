<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galería de Arte - Inicio</title>
    <!-- Iconos -->
    <link
      crossorigin="anonymous"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      referrerpolicy="no-referrer"
      rel="stylesheet"
    />
    <!-- Estilos -->
    <link href="../CSS/main.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <!-- NAVBAR -->
    <!-- MENÚ DESPLEGABLE -->
    <!-- CONTENIDO PRINCIPAL -->
    <div class="container">
      <div class="carousel">
        <div class="slides fade">
          <img alt="Arte 1" src="../Imagenes/arte1.jpeg" />
        </div>
        <div class="slides fade">
          <img alt="Arte 2" src="../Imagenes/arte2.jpeg" />
        </div>
        <div class="slides fade">
          <img alt="Arte 3" src="../Imagenes/arte3.jpeg" />
        </div>
      </div>
      <!-- Login -->
      <div class="col-login">
        <section class="login-section">
          <div class="login-container">
            <h1>Bienvenido</h1>
            <form action="../api/login" method="post">
              <div class="input-group">
                <i class="fas fa-user"> </i>
                <input
                  name="email"
                  placeholder="Correo electrónico"
                  required=""
                  type="email"
                />
              </div>
              <div class="input-group">
                <i class="fas fa-lock"> </i>
                <input
                  name="password"
                  placeholder="Contraseña"
                  required=""
                  type="password"
                />
              </div>
              <button class="btn-login-main" type="submit">
                Iniciar sesión
              </button>
              <a class="forgot-password" href="recuperar-password.html">
                ¿Olvidaste tu contraseña?
              </a>
            </form>
          </div>
        </section>
      </div>
    </div>
    <!-- FOOTER -->
    <div id="footer-placeholder"></div>
    <script src="../JS/componentes.js"></script>
    <script src="../JS/carousel.js"></script>
  </body>
</html>
